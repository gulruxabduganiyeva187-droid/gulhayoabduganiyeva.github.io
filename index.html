<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulhayo | AI Researcher</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: #050112; /* Kosmik qora fon */
            color: white;
            font-family: 'Poppins', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050112 100%);
            overflow-x: hidden;
        }

        /* Neon Effektlari */
        .neon-text {
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #ff00ff;
            font-family: 'Orbitron', sans-serif;
        }

        .profile-ring {
            width: 180px; height: 180px;
            margin: 0 auto;
            border-radius: 50%;
            padding: 5px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.6);
            position: relative;
        }

        .profile-ring img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #050112;
        }

        /* Menyu tugmalari (Karta ko'rinishida) */
        .nav-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: 0.4s;
            cursor: pointer;
            backdrop-filter: blur(10px);
            height: 100%;
        }

        .nav-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            border-color: #ff00ff;
        }

        .nav-card i {
            font-size: 2.5rem;
            margin-bottom: 15px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-ai {
            background: linear-gradient(45deg, #ff00ff, #7c3aed);
            border: none;
            border-radius: 50px;
            color: white;
            padding: 12px 30px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.5);
        }

        /* Yulduzli osmon effekti */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div class="container text-center py-5">
        <div class="profile-ring mb-4">
            <img src="1000048188.jpg" alt="Gulhayo">
        </div>
        
        <h1 class="neon-text mb-2">Gulhayo</h1>
        <p class="text-info fw-bold">AI Researcher & Creative Developer</p>
        
        <hr class="my-5 border-secondary opacity-25">

        <h5 class="mb-4" style="letter-spacing: 2px;">MENING YO'NALISHLARIM</h5>
        <div class="row g-4">
            <div class="col-6 col-md-3">
                <div class="nav-card">
                    <i class="fas fa-book-open"></i>
                    <h6>Biografiya</h6>
                    <p class="small text-muted">Men haqimda</p>
                </div>
                </div>
            <div class="col-6 col-md-3">
                <div class="nav-card">
                    <i class="fas fa-file-alt"></i>
                    <h6>Maqolalar</h6>
                    <p class="small text-muted">Ilmiy ishlar</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="nav-card">
                    <i class="fas fa-brain"></i>
                    <h6>AI Kamera</h6>
                    <p class="small text-muted">Kabutar tanish</p>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="nav-card">
                    <i class="fas fa-paper-plane"></i>
                    <h6>Aloqa</h6>
                    <p class="small text-muted">Bog'lanish</p>
                </div>
            </div>
        </div>

        <div class="mt-5 p-4 rounded-4" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(0,255,255,0.1);">
            <h4 class="neon-text mb-4">AI Vision Tizimi</h4>
            <div id="webcam-container" class="mb-3"></div>
            <div id="label-container" class="mb-3"></div>
            <button class="btn btn-ai" onclick="init()">
                <i class="fas fa-rocket me-2"></i> Tizimni ishga tushirish
            </button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/aCwgeVOmQ/";
        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();
            webcam = new tmImage.Webcam(300, 300, true);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }
        async function loop() { webcam.update(); await predict(); window.requestAnimationFrame(loop); }
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = <span class="badge bg-dark border border-info m-1">${classPrediction}</span>;
            }
        }
    </script>
</body>
</html>
