<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulhayo | AI Researcher</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        html { scroll-behavior: smooth; }
        body {
            background: #050112;
            color: white;
            font-family: 'Poppins', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050112 100%);
            min-height: 100vh;
            margin: 0; padding: 0;
        }

        .neon-text {
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            font-family: 'Orbitron', sans-serif;
        }

        .profile-ring {
            width: 150px; height: 150px; margin: 0 auto;
            border-radius: 50%; padding: 5px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }

        .profile-ring img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
            border: 3px solid #050112;
        }

        .nav-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 20px; padding: 20px;
            transition: 0.3s; backdrop-filter: blur(10px);
            text-decoration: none; color: white; display: block;
        }

        .nav-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 0, 255, 0.1);
            border-color: #ff00ff;
        }

        .btn-ai {
            background: linear-gradient(45deg, #ff00ff, #7c3aed);
            border: none; border-radius: 50px; color: white;
            padding: 10px 25px; font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        #webcam-container canvas {
            border-radius: 15px; border: 3px solid #ff00ff;
            max-width: 100%; height: auto !important;
        }

        .main-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 255, 0.1);
            border-radius: 30px; padding: 30px;
            margin-top: 50px;
        }

        .data-table-area {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px; padding: 20px;
            margin-top: 30px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="container text-center py-5">
        <div class="profile-ring mb-3">
            <img src="1000048188.jpg" alt="Gulhayo">
        </div>
        <h2 class="neon-text">Gulhayo</h2>
        <p class="text-info small fw-bold">AI RESEARCHER & DEVELOPER</p>

        <div class="row g-3 mt-4">
            <div class="col-6 col-md-3"><div class="nav-card"><i class="fas fa-book-open"></i><br>Bio</div></div>
            <div class="col-6 col-md-3"><div class="nav-card"><i class="fas fa-file-alt"></i><br>Maqolalar</div></div>
            <div class="col-6 col-md-3">
                <a href="#vision-block" class="nav-card">
                    <i class="fas fa-brain"></i><br>AI Kamera
                </a>
            </div>
            <div class="col-6 col-md-3"><div class="nav-card"><i class="fas fa-paper-plane"></i><br>Aloqa</div></div>
        </div>

        <div id="vision-block" class="main-section">
            <h4 class="neon-text mb-4">AI Vision & Dataset</h4>
            <div id="webcam-container" class="mb-3 d-flex justify-content-center">
                <div id="placeholder-bg" style="width: 200px; height: 200px; background: rgba(0,0,0,0.5); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed #ff00ff;">
                    <i class="fas fa-video fa-2x text-muted"></i>
                </div>
            </div>

            <div id="label-container" class="mb-4 fw-bold" style="color: #00ffff; font-family: 'Orbitron', sans-serif;"></div>

            <div class="d-flex justify-content-center gap-3 mb-5">
                <button id="start-btn" class="btn btn-ai" onclick="init()">
                    <i class="fas fa-play me-2"></i> Kamerani yoqish
                </button>
                <button id="stop-btn" class="btn btn-outline-danger rounded-pill px-4" onclick="stopWebcam()" style="display: none;">
                    <i class="fas fa-stop me-2"></i> To'xtatish
                </button>
            </div>

            <div class="data-table-area text-start">
                <h5 class="text-info mb-3"><i class="fas fa-database me-2"></i> Mening Datasetim</h5>
                <div class="table-responsive">
                    <table class="table table-dark table-sm mb-0">
                        <thead>
                            <tr><th>№</th><th>Loyiha</th><th>Turi</th><th>Holat</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>1</td><td>Kabutar modeli</td><td>Image</td><td><span class="badge bg-success">Tayyor</span></td></tr>
                            <tr><td>2</td><td>QarSU ma'lumotlari</td><td>Text</td><td><span class="badge bg-warning text-dark">Jarayonda</span></td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/aCwgeVOmQ/";
        let model, webcam, labelContainer, maxPredictions;
        let isRunning = false;

        async function init() {
            try {
                if (isRunning) return;
                document.getElementById("label-container").innerHTML = "Yuklanmoqda...";
                
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();

                webcam = new tmImage.Webcam(200, 200, true); 
                await webcam.setup(); 
                await webcam.play();
                
                isRunning = true;
                window.requestAnimationFrame(loop);

                document.getElementById("placeholder-bg").style.display = "none";
                document.getElementById("webcam-container").innerHTML = "";
                document.getElementById("webcam-container").appendChild(webcam.canvas);
                
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) {
                    labelContainer.appendChild(document.createElement("div"));
                }

                document.getElementById("start-btn").style.display = "none";
                document.getElementById("stop-btn").style.display = "inline-block";
            } catch (e) {
                document.getElementById("label-container").innerHTML = "<span class='text-danger'>Kameraga ruxsat bering!</span>";
            }
        }

        async function loop() {
            if (!isRunning) return;
            webcam.update();
            await predict();
            window.requestAnimationFrame(loop);
        }
        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = <div class="badge border border-info m-1 p-2">${classPrediction}</div>;
            }
        }

        function stopWebcam() {
            if (webcam) {
                webcam.stop();
                isRunning = false;
                document.getElementById("webcam-container").innerHTML = '<div id="placeholder-bg" style="width: 200px; height: 200px; background: rgba(0,0,0,0.5); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed #ff00ff;"><i class="fas fa-video fa-2x text-muted"></i></div>';
                labelContainer.innerHTML = "To'xtatildi";
                document.getElementById("start-btn").style.display = "inline-block";
                document.getElementById("stop-btn").style.display = "none";
            }
        }
    </script>
</body>
</html>
