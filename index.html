<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulhayo | AI Researcher</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background: #050112;
            color: white;
            font-family: 'Poppins', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a0b2e 0%, #050112 100%);
            min-height: 100vh;
        }
        .neon-text {
            color: #fff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            font-family: 'Orbitron', sans-serif;
        }
        .profile-ring {
            width: 150px; height: 150px; margin: 0 auto;
            border-radius: 50%; padding: 5px;
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        .profile-ring img {
            width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
        }
        .nav-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 20px; padding: 20px;
            transition: 0.3s; backdrop-filter: blur(10px);
        }
        .btn-ai {
            background: linear-gradient(45deg, #ff00ff, #7c3aed);
            border: none; border-radius: 50px; color: white;
            padding: 10px 25px; font-weight: bold;
        }
        #webcam-container canvas {
            border-radius: 15px;
            border: 2px solid #ff00ff;
        }
    </style>
</head>
<body>

    <div class="container text-center py-5">
        <div class="profile-ring mb-3">
            <img src="1000048188.jpg" alt="Gulhayo">
        </div>
        <h2 class="neon-text">Gulhayo</h2>
        <p class="text-info small">AI Researcher & Developer</p>

        <div class="row g-3 mt-4">
            <div class="col-6 col-md-3"><div class="nav-card"><i class="fas fa-book-open mb-2"></i><br>Bio</div></div>
            <div class="col-6 col-md-3"><div class="nav-card"><i class="fas fa-file-alt mb-2"></i><br>Maqolalar</div></div>
            <div class="col-6 col-md-3"><div class="nav-card"><i class="fas fa-brain mb-2"></i><br>AI Kamera</div></div>
            <div class="col-6 col-md-3"><div class="nav-card"><i class="fas fa-paper-plane mb-2"></i><br>Aloqa</div></div>
        </div>

        <div class="mt-5 p-4 rounded-4" style="background: rgba(255,255,255,0.02); border: 1px solid rgba(0,255,255,0.1);">
            <h4 class="neon-text mb-4">AI Vision Tizimi</h4>
            
            <div id="webcam-container" class="mb-3 d-flex justify-content-center">
                <div id="placeholder-bg" style="width: 200px; height: 200px; background: rgba(0,0,0,0.5); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed #ff00ff;">
                    <i class="fas fa-video-slash fa-2x text-muted"></i>
                </div>
            </div>

            <div id="label-container" class="mb-4 fw-bold" style="color: #00ffff; font-family: 'Orbitron', sans-serif;"></div>

            <div class="d-flex justify-content-center gap-3">
                <button id="start-btn" class="btn btn-ai" onclick="init()">
                    <i class="fas fa-play me-2"></i> Ishga tushirish
                </button>
                <button id="stop-btn" class="btn btn-outline-danger rounded-pill px-4" onclick="stopWebcam()" style="display: none;">
                    <i class="fas fa-stop me-2"></i> To'xtatish
                </button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/aCwgeVOmQ/";
        let model, webcam, labelContainer, maxPredictions;
        let isRunning = false;

        async function init() {
            if (isRunning) return;
            model = await tmImage.load(URL + "model.json", URL + "metadata.json");
            maxPredictions = model.getTotalClasses();
            webcam = new tmImage.Webcam(200, 200, true); 
            await webcam.setup(); 
            await webcam.play();
            isRunning = true;
            window.requestAnimationFrame(loop);
            document.getElementById("placeholder-bg").style.display = "none";
            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) { labelContainer.appendChild(document.createElement("div")); }
            document.getElementById("start-btn").style.display = "none";
            document.getElementById("stop-btn").style.display = "inline-block";
        }

        async function loop() { if (!isRunning) return; webcam.update(); await predict(); window.requestAnimationFrame(loop); }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = <div class="badge border border-info m-1 p-2">${classPrediction}</div>;
            }
        }

        function stopWebcam() {
            if (webcam) {
                webcam.stop();
                isRunning = false;
                document.getElementById("webcam-container").innerHTML = '<div id="placeholder-bg" style="width: 200px; height: 200px; background: rgba(0,0,0,0.5); border-radius: 15px; display: flex; align-items: center; justify-content: center; border: 1px dashed #ff00ff;"><i class="fas fa-video-slash fa-2x text-muted"></i></div>';
                labelContainer.innerHTML = "Tizim to'xtatildi";
                document.getElementById("start-btn").style.display = "inline-block";
                document.getElementById("stop-btn").style.display = "none";
            }
        }
    </script>
</body>
</html>
