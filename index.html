<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gulhayo | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --accent: #d2b4b4; 
            --dark: #4e342e;
            --glass: rgba(255, 255, 255, 0.88);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }

        body {
            height: 100vh; overflow: hidden;
            background: linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)), 
                        url('https://i.pinimg.com/originals/30/8a/8a/308a8a68e82a3821a7337989337038e4.jpg');
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center;
        }

        /* CHIZMADAGI OVAL MENYU */
        .main-container { text-align: center; z-index: 10; }
        
        .profile-bubble {
            width: 140px; height: 140px; border-radius: 50%;
            background: white; border: 4px solid var(--accent);
            margin: 0 auto 40px; 
            background-image: url('https://i.pinimg.com/736x/0a/6d/4e/0a6d4e2878c7755b7f14b3f86e9e38f6.jpg');
            background-size: cover; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .menu-cloud {
            display: flex; flex-direction: column; gap: 15px; align-items: center;
        }

        .oval-btn {
            background: var(--glass); border: 1px solid var(--accent);
            padding: 14px 45px; border-radius: 60px;
            cursor: pointer; font-size: 0.85rem; letter-spacing: 2px;
            color: var(--dark); transition: 0.4s;
            text-transform: lowercase; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .oval-btn:hover {
            transform: scale(1.05);
            background: white; border-color: var(--dark);
        }

        /* SECTIONS */
        .content-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none;
            padding: 40px 20px; overflow-y: auto;
            animation: openIn 0.4s ease-out;
        }

        @keyframes openIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .close-icon {
            position: fixed; top: 20px; right: 30px; font-size: 2.5rem;
            cursor: pointer; color: var(--dark); z-index: 2100;
        }

        .inner-content { max-width: 900px; margin: 0 auto; text-align: center; padding-bottom: 50px; }
        h2 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 30px; color: var(--dark); }

        .pdf-viewer { 
            width: 100%; height: 75vh; border-radius: 15px; border: 1px solid #eee; 
            margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
        }

        #webcam-wrap { 
            margin: 20px auto; border-radius: 20px; border: 5px solid #f9f9f9;
            width: 260px; height: 260px; overflow: hidden; background: #eee;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="profile-bubble"></div>
        <div class="menu-cloud">
            <div class="oval-btn" onclick="show('about')">men haqimda</div>
            <div class="oval-btn" onclick="show('aims')">maqsadim</div>
            <div class="oval-btn" onclick="show('ai')">loyihalarim</div>
            <div class="oval-btn" onclick="show('docs')">maqolalarim</div>
            <div class="oval-btn" onclick="show('contact')">bog'lanish</div>
        </div>
    </div>
    <div id="about" class="content-overlay">
        <span class="close-icon" onclick="hide('about')">&times;</span>
        <div class="inner-content">
            <h2>Men Haqimda</h2>
            <p style="font-size: 1.1rem; color: #555;">Qarshi Davlat Universiteti talabasi, AI Researcher.</p>
        </div>
    </div>

    <div id="docs" class="content-overlay">
        <span class="close-icon" onclick="hide('docs')">&times;</span>
        <div class="inner-content">
            <h2>Maqolalarim</h2>
            <h3 style="margin-bottom:10px; font-size:1rem; color:#888;">1. Big Data Tadbig'i</h3>
            <iframe class="pdf-viewer" src="313-320.pdf"></iframe>
            
            <h3 style="margin-bottom:10px; font-size:1rem; color:#888;">2. ResOAK-2025</h3>
            <iframe class="pdf-viewer" src="MaqolaResOAK-2025ajratilgani.pdf"></iframe>
        </div>
    </div>

    <div id="ai" class="content-overlay">
        <span class="close-icon" onclick="hide('ai')">&times;</span>
        <div class="inner-content">
            <h2>AI: Kabutarni Tanish</h2>
            <button class="oval-btn" onclick="startAI()">Kamerani yoqish</button>
            <button class="oval-btn" onclick="stopAI()" style="background:#fff5f5">To'xtatish</button>
            <div id="webcam-wrap"></div>
            <div id="label-container" style="font-size: 1.2rem; margin-top: 20px;"></div>
        </div>
    </div>

    <div id="contact" class="content-overlay">
        <span class="close-icon" onclick="hide('contact')">&times;</span>
        <div class="inner-content">
            <h2>Bog'lanish</h2>
            <p>Telegram: @G_Abduganiyeva</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

    <script>
        function show(id) { document.getElementById(id).style.display = 'block'; }
        function hide(id) { 
            document.getElementById(id).style.display = 'none'; 
            if(id === 'ai') stopAI();
        }

        let model, webcam, labelContainer, maxPredictions, animationId;
        async function startAI() {
            try {
                const URL = "./my_model/";
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                maxPredictions = model.getTotalClasses();
                webcam = new tmImage.Webcam(260, 260, true);
                await webcam.setup(); await webcam.play();
                window.requestAnimationFrame(loop);
                document.getElementById("webcam-wrap").innerHTML = "";
                document.getElementById("webcam-wrap").appendChild(webcam.canvas);
                labelContainer = document.getElementById("label-container");
                labelContainer.innerHTML = "";
                for (let i = 0; i < maxPredictions; i++) labelContainer.appendChild(document.createElement("div"));
            } catch(e) { alert("Xato: Model yuklanmadi!"); }
        }
        async function loop() { webcam.update(); await predict(); animationId = window.requestAnimationFrame(loop); }
        async function predict() {
            const p = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.childNodes[i].innerHTML = p[i].className + ": " + (p[i].probability * 100).toFixed(0) + "%";
            }
        }
        function stopAI() {
            if (webcam) webcam.stop();
            if (animationId) window.cancelAnimationFrame(animationId);
            document.getElementById("webcam-wrap").innerHTML = "";
            document.getElementById("label-container").innerHTML = "";
        }
    </script>
</body>
</html>
